# Secrets 필요: VPS_HOST, VPS_USER(=deploy), VPS_SSH_KEY
name: Deploy to VPS

on:
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
  workflow_dispatch:

concurrency:
  group: deploy-dfprice
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: SSH and redeploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 30m
          script: |
            set -euo pipefail
            cd /opt/j-hawk/smart-duty-free
            git fetch origin main
            git reset --hard origin/main
            cd /opt/j-hawk/deploy
            docker compose build dfprice
            docker compose up -d dfprice
            sleep 10
            docker compose ps dfprice

      - name: Healthcheck
        run: |
          for i in {1..6}; do
            if curl -fsS https://dfprice.jhawk.kr/healthz; then
              echo "OK"; exit 0
            fi
            sleep 10
          done
          echo "Healthcheck failed"; exit 1
