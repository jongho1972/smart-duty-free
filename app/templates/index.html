<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Smart Duty Free · 면세점 가격 비교</title>
  <meta name="description" content="신라·롯데·신세계 인터넷면세점 동일 상품 할인율·가격 비교" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@500;700;800;900&family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
  <style id="auth-gate"></style>
  <script src="/static/auth.js"></script>
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">INTERNET DUTY FREE PRICE COMPARE</p>
      <h1>인터넷 면세점<br /><span>가격 비교</span></h1>
    </div>
  </header>

  <main>
    <form id="batch-form" class="batch-card" autocomplete="off">
      <div class="field">
        <div class="batch-label-row">
          <label for="batch-input">상품 목록 · 한 줄에 하나씩 (모델코드〈Tab〉브랜드)</label>
          <button type="button" class="paste-btn" data-target="batch-input" title="클립보드에서 붙여넣기" aria-label="목록 붙여넣기">붙여넣기</button>
        </div>
        <textarea id="batch-input" rows="6" placeholder="예)&#10;VVCC25/BR    VEDI VERO EYE(토산)&#10;HTB12/GRY    HUNTER EYE&#10;AS1178 001    A.SUI EYE (토산)"></textarea>
      </div>
      <button type="submit" id="batch-btn">
        <span class="btn-label">전체 비교</span>
        <span class="spinner" aria-hidden="true"></span>
      </button>
    </form>

    <p class="hint" id="hint">실시간으로 3개 면세점을 조회합니다 · 신세계는 보안 검증 때문에 첫 조회가 다소 느릴 수 있어요.</p>

    <section id="results" class="results" hidden></section>
  </main>

  <footer>
    <p>가격·할인율은 조회 시점의 각 인터넷면세점 공개 정보 기준이며, 회원등급·쿠폰·환율에 따라 실구매가가 달라질 수 있습니다.</p>
    <p class="muted">Smart Duty Free · 개인 참고용 비공식 도구</p>
  </footer>

  <script src="/static/app.js"></script>
</body>
</html>
