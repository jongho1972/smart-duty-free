<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>인터넷면세점 할인율 비교 | 신라·롯데·신세계</title>
  <meta name="description" content="신라·롯데·신세계 인터넷면세점의 동일 상품 할인율을 실시간으로 비교해 최저가를 한눈에 확인하세요. SKU 번호로 정가·할인율·링크를 면세점별로 한번에 조회합니다." />
  <meta name="robots" content="index, follow" />
  <link rel="canonical" href="https://dfprice.jhawk.kr/" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🛍️%3C/text%3E%3C/svg%3E" />

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Smart Duty Free 면세점 가격비교" />
  <meta property="og:title" content="인터넷면세점 할인율 비교 | 신라·롯데·신세계" />
  <meta property="og:description" content="신라·롯데·신세계 인터넷면세점 동일 상품의 할인율을 실시간 비교해 최저가를 확인하세요." />
  <meta property="og:url" content="https://dfprice.jhawk.kr/" />
  <meta property="og:image" content="https://dfprice.jhawk.kr/static/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:locale" content="ko_KR" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="인터넷면세점 할인율 비교 · 신라·롯데·신세계" />
  <meta name="twitter:description" content="신라·롯데·신세계 동일 상품 가격·할인율 실시간 비교." />
  <meta name="twitter:image" content="https://dfprice.jhawk.kr/static/og-image.png" />

  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "WebApplication",
    "name": "Smart Duty Free 면세점 가격비교",
    "url": "https://dfprice.jhawk.kr/",
    "description": "신라·롯데·신세계 인터넷면세점의 동일 상품 가격과 할인율을 실시간 비교하는 웹 서비스",
    "applicationCategory": "ShoppingApplication",
    "operatingSystem": "Web",
    "inLanguage": "ko-KR",
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "KRW" }
  }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css" />
  <link rel="stylesheet" href="/static/style.css?v={{ v }}" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <p class="eyebrow">INTERNET DUTY FREE DISCOUNT COMPARE</p>
      <h1>인터넷면세점 <span>할인율 비교</span></h1>
    </div>
  </header>

  <main>
    <!-- 로그인은 결과표 "🔒 로그인 시" 힌트로만 진입(필요할 때만). 여기엔 로그인 상태 칩만 표시 -->
    <div class="login-bar">
      <span class="cred-badge" id="login-chip" hidden></span>
    </div>

    <form id="batch-form" class="batch-card" autocomplete="off">
      <div class="field">
        <label for="batch-input">SKU 번호 입력</label>
        <p class="field-desc">한 줄에 하나씩 입력 · 엑셀 열을 선택해 복사한 뒤 그대로 붙여넣기 가능 · 최대 50개</p>
        <textarea id="batch-input" rows="10" placeholder="976314000009&#10;731616005923&#10;867023000061">084613000034
      </div>
      <div class="batch-actions">
        <button type="submit" id="batch-btn">
          <span class="btn-label">전체 비교</span>
          <span class="spinner" aria-hidden="true"></span>
        </button>
        <button type="button" id="clear-btn">초기화</button>
        <span class="batch-progress" id="batch-progress" role="status" aria-live="polite" hidden></span>
      </div>
    </form>

    <p class="hint" id="hint">신라에서 SKU로 상품과 REF.NO를 확인 후, 롯데·신세계를 검색합니다 · 첫 조회는 준비 과정 때문에 다소 느릴 수 있어요.</p>

    <!-- 몰 토글: 평소엔 숨김, 결과 렌더 시 결과 툴바(엑셀 다운로드 왼쪽)로 이동해 노출 -->
    <div class="mall-toggle" role="group" aria-label="조회 몰 선택" hidden>
      <button type="button" class="mall-btn active" data-mall="kr" aria-pressed="true">🇰🇷 KR몰</button>
      <button type="button" class="mall-btn" data-mall="cn" aria-pressed="false">🇨🇳 CN몰</button>
      <button type="button" class="mall-btn" data-mall="en" aria-pressed="false">🇺🇸 EN몰</button>
      <button type="button" class="mall-btn" data-mall="jp" aria-pressed="false">🇯🇵 JP몰</button>
    </div>
    <p class="mall-note" id="mall-note" hidden></p>

    <section id="results" class="results" hidden></section>
  </main>

  <!-- 로그인 모달: 평소 숨김. 롯데 할인율 게이팅 시 자동, 또는 상단 버튼으로 수동 오픈 -->
  <div class="login-modal-backdrop" id="login-modal" hidden>
    <div class="login-modal" role="dialog" aria-modal="true" aria-labelledby="login-modal-title">
      <div class="login-modal-head">
        <h2 id="login-modal-title">면세점 로그인</h2>
        <button type="button" class="login-modal-close" id="login-close-btn" aria-label="닫기">✕</button>
      </div>
      <p class="login-modal-desc" id="login-modal-desc">할인율이 로그인에 가려진 면세점만 로그인하면 됩니다.</p>
      <div class="cred-body">
        <div class="cred-row" data-site="lotte">
          <span class="cred-label">L.POINT 통합회원</span>
          <input id="lotte-id" type="text"     class="cred-input" placeholder="아이디" autocomplete="username" />
          <input id="lotte-pw" type="password" class="cred-input" placeholder="비밀번호" autocomplete="current-password" />
        </div>
        <div class="cred-row" data-site="ssg">
          <span class="cred-label">신세계면세점 회원</span>
          <input id="ssg-id"   type="text"     class="cred-input" placeholder="아이디" autocomplete="username" />
          <input id="ssg-pw"   type="password" class="cred-input" placeholder="비밀번호" autocomplete="current-password" />
        </div>
        <div class="cred-actions">
          <button type="button" id="cred-relogin-btn">로그인</button>
          <button type="button" id="cred-refetch-btn" hidden>다시 조회</button>
          <span id="cred-login-status" class="cred-login-status" hidden></span>
        </div>
        <p class="cred-note">로그인 정보는 이 브라우저 탭에만 임시 저장되며, 탭을 닫으면 자동 삭제됩니다.</p>
      </div>
    </div>
  </div>

  <footer class="footnote">
    <div class="footnote-block">
      <div class="footnote-title">데이터 출처</div>
      <ul>
        <li>신라 · 롯데 · 신세계 인터넷면세점 공개 상품 정보 (조회 시점 기준)</li>
      </ul>
    </div>
    <div class="footnote-block">
      <div class="footnote-title">유의 사항</div>
      <ul>
        <li>가격·할인율은 회원등급·쿠폰·환율에 따라 실구매가가 달라질 수 있습니다.</li>
        <li>면세가는 정가(USD) 대표값이며, 면세점별 표기·환율에 따라 차이가 있을 수 있습니다.</li>
      </ul>
    </div>
    <div class="credit">Built with Claude Code by 이종호 (<a href="https://jhawk.kr" target="_blank" rel="noopener">jhawk.kr</a>)</div>
  </footer>

  <script src="/static/app.js?v={{ v }}"></script>
</body>
</html>
